<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | EventHub</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="auth-page">
    <section class="auth-card">
        <h1>Create account</h1>
        <p>Register once, then sign up for any event.</p>
        <form th:action="@{/register}" th:object="${userRegistrationDto}" method="post" class="form">
            <label>Full Name</label>
            <input type="text" th:field="*{fullName}" placeholder="Your full name">
            <span class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>

            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="you@example.com">
            <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>

            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="At least 6 characters">
            <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>

            <button type="submit" class="btn full">Create Account</button>
        </form>
        <p class="muted">Already registered? <a th:href="@{/login}">Login</a></p>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
