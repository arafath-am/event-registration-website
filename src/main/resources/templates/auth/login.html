<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EventHub</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="auth-page">
    <section class="auth-card">
        <h1>Welcome back</h1>
        <p>Login to manage your registrations.</p>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div th:if="${param.error}" class="alert error">Invalid email or password.</div>
        <div th:if="${param.logout}" class="alert success">You have been logged out.</div>
        <form th:action="@{/login}" method="post" class="form">
            <label>Email</label>
            <input type="email" name="username" placeholder="you@example.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="btn full">Login</button>
        </form>
        <p class="muted">No account? <a th:href="@{/register}">Create one</a></p>
        <div class="demo-box">
            <strong>Demo:</strong> admin@eventhub.com / admin123<br>
            <strong>User:</strong> user@eventhub.com / user123
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
