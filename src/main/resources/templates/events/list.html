<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | EventHub</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="container">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <section class="page-header">
        <h1>Upcoming Events</h1>
        <p>Search workshops, research events, career sessions, and student activities.</p>
    </section>

    <form th:action="@{/events}" method="get" class="search-bar">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by title, category, location...">
        <button type="submit" class="btn">Search</button>
        <a th:href="@{/events}" class="btn secondary">Clear</a>
    </form>

    <div class="empty-state" th:if="${#lists.isEmpty(events)}">
        <h2>No events found</h2>
        <p>Try another keyword. Apparently even databases have boundaries.</p>
    </div>

    <div class="event-grid">
        <article class="event-card" th:each="event : ${events}">
            <div class="event-image" th:style="|background-image: url('${event.imageUrl}')|"></div>
            <div class="event-body">
                <span class="pill" th:text="${event.category}">Category</span>
                <h3 th:text="${event.title}">Event title</h3>
                <p th:text="${#strings.abbreviate(event.description, 130)}">Description</p>
                <div class="meta">
                    <span th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy h:mm a')}">Date</span>
                    <span th:text="${event.location}">Location</span>
                </div>
                <a th:href="@{/events/{id}(id=${event.id})}" class="card-link">View Details</a>
            </div>
        </article>
    </div>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
