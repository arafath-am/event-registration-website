<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registrations | EventHub</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="container">
    <section class="page-header">
        <h1 th:text="${event.title}">Event</h1>
        <p>Registration list for this event.</p>
    </section>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Status</th>
                <th>Registered At</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="registration : ${registrations}">
                <td th:text="${registration.user.fullName}">Name</td>
                <td th:text="${registration.user.email}">Email</td>
                <td><span class="status" th:text="${registration.status}">REGISTERED</span></td>
                <td th:text="${#temporals.format(registration.registeredAt, 'MMM dd, yyyy h:mm a')}">Date</td>
            </tr>
            <tr th:if="${#lists.isEmpty(registrations)}">
                <td colspan="4" class="empty-table">No registrations yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
    <a th:href="@{/admin/dashboard}" class="btn secondary">Back to Dashboard</a>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
