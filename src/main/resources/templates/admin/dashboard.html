<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | EventHub</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="container">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <section class="page-header admin-header">
        <div>
            <h1>Admin Dashboard</h1>
            <p>Create and manage events, because apparently calendars were not enough for civilization.</p>
        </div>
        <a th:href="@{/admin/events/new}" class="btn">Create Event</a>
    </section>

    <section class="stats-grid">
        <div class="stat-card"><span>Published Events</span><strong th:text="${publishedEventCount}">0</strong></div>
        <div class="stat-card"><span>Active Registrations</span><strong th:text="${activeRegistrationCount}">0</strong></div>
        <div class="stat-card"><span>Waitlisted Users</span><strong th:text="${waitlistedCount}">0</strong></div>
    </section>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Date</th>
                <th>Status</th>
                <th>Capacity</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="event : ${events}">
                <td th:text="${event.title}">Title</td>
                <td th:text="${event.category}">Category</td>
                <td th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy h:mm a')}">Date</td>
                <td><span class="status" th:text="${event.status}">PUBLISHED</span></td>
                <td th:text="${event.capacity}">100</td>
                <td class="actions">
                    <a th:href="@{/admin/events/{id}/edit(id=${event.id})}" class="btn small secondary">Edit</a>
                    <a th:href="@{/admin/events/{id}/registrations(id=${event.id})}" class="btn small secondary">Registrations</a>
                    <form th:action="@{/admin/events/{id}/delete(id=${event.id})}" method="post" onsubmit="return confirm('Delete this event?')">
                        <button type="submit" class="btn small danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
