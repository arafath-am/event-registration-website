<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | EventHub'">Event Form</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="container narrow">
    <section class="page-header">
        <h1 th:text="${pageTitle}">Create Event</h1>
        <p>Fill in event details and publish it to the public listing.</p>
    </section>

    <div th:if="${formError}" class="alert error" th:text="${formError}"></div>

    <form th:action="${eventId} == null ? @{/admin/events} : @{/admin/events/{id}(id=${eventId})}" th:object="${eventForm}" method="post" class="form panel">
        <label>Title</label>
        <input type="text" th:field="*{title}" placeholder="Event title">
        <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>

        <label>Description</label>
        <textarea th:field="*{description}" rows="5" placeholder="Event description"></textarea>
        <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>

        <div class="form-grid">
            <div>
                <label>Location</label>
                <input type="text" th:field="*{location}" placeholder="Building / room / online">
                <span class="field-error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></span>
            </div>
            <div>
                <label>Category</label>
                <input type="text" th:field="*{category}" placeholder="Technology, Academic, Career">
                <span class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
            </div>
        </div>

        <div class="form-grid">
            <div>
                <label>Event Date</label>
                <input type="datetime-local" th:field="*{eventDate}">
                <span class="field-error" th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}"></span>
            </div>
            <div>
                <label>Registration Deadline</label>
                <input type="datetime-local" th:field="*{registrationDeadline}">
                <span class="field-error" th:if="${#fields.hasErrors('registrationDeadline')}" th:errors="*{registrationDeadline}"></span>
            </div>
        </div>

        <div class="form-grid">
            <div>
                <label>Capacity</label>
                <input type="number" th:field="*{capacity}" min="1">
                <span class="field-error" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></span>
            </div>
            <div>
                <label>Status</label>
                <select th:field="*{status}">
                    <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
                </select>
            </div>
        </div>

        <label>Image URL</label>
        <input type="url" th:field="*{imageUrl}" placeholder="https://example.com/image.jpg">

        <div class="form-actions">
            <button type="submit" class="btn">Save Event</button>
            <a th:href="@{/admin/dashboard}" class="btn secondary">Cancel</a>
        </div>
    </form>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
