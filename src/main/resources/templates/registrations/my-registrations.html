<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Registrations | EventHub</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="container">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <section class="page-header">
        <h1>My Registrations</h1>
        <p>Track the events you registered for.</p>
    </section>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>Event</th>
                <th>Date</th>
                <th>Status</th>
                <th>Registered At</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="registration : ${registrations}">
                <td><a th:href="@{/events/{id}(id=${registration.event.id})}" th:text="${registration.event.title}">Event</a></td>
                <td th:text="${#temporals.format(registration.event.eventDate, 'MMM dd, yyyy h:mm a')}">Date</td>
                <td><span class="status" th:text="${registration.status}">REGISTERED</span></td>
                <td th:text="${#temporals.format(registration.registeredAt, 'MMM dd, yyyy h:mm a')}">Registered</td>
                <td>
                    <form th:if="${registration.status.name() != 'CANCELLED'}" th:action="@{/registrations/{id}/cancel(id=${registration.id})}" method="post">
                        <button type="submit" class="btn danger small">Cancel</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(registrations)}">
                <td colspan="5" class="empty-table">No registrations yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
